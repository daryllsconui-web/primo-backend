services:
  - type: web
    name: primo-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS_STR
        value: "*"
      - key: AGENT_NAME
        value: Primo
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SIMILARITY_THRESHOLD
        value: "0.70"
      - key: TOP_K
        value: "5"
    plan: free
